<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuizHub - Profile
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#070414,#140b2c,#1b1140);
color:white;
min-height:100vh;
overflow-x:hidden;
position:relative;
}

/* GLOW */

.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
z-index:-1;
opacity:0.6;
animation:float 8s infinite ease-in-out;
}

.circle1{
width:320px;
height:320px;
background:#9333ea;
top:-120px;
left:-100px;
}

.circle2{
width:280px;
height:280px;
background:#3b82f6;
bottom:-120px;
right:-100px;
}

@keyframes float{
50%{
transform:translateY(30px);
}
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:32px;
font-weight:800;
background:linear-gradient(90deg,#c084fc,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav{
display:flex;
gap:18px;
flex-wrap:wrap;
}

.nav a{
color:#ddd;
text-decoration:none;
font-size:15px;
transition:0.3s;
}

.nav a:hover{
color:#a855f7;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

/* PROFILE CARD */

.profile-card{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(18px);
border-radius:30px;
padding:40px;
border:1px solid rgba(255,255,255,0.1);
position:relative;
overflow:hidden;
box-shadow:0 0 40px rgba(168,85,247,0.2);
}

.profile-card::before{
content:"";
position:absolute;
width:250px;
height:250px;
background:rgba(168,85,247,0.2);
border-radius:50%;
top:-90px;
right:-90px;
filter:blur(50px);
}

/* PROFILE TOP */

.profile-top{
display:flex;
align-items:center;
gap:30px;
flex-wrap:wrap;
}

/* ICON */

.body-box{
width:120px;
height:120px;
border-radius:30px;
background:linear-gradient(135deg,#9333ea,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
font-size:65px;
box-shadow:0 0 35px rgba(168,85,247,0.5);
}

/* INFO */

.profile-info h2{
font-size:34px;
margin-bottom:8px;
}

.profile-info p{
color:#cfcfcf;
margin-top:8px;
font-size:15px;
}

.badge{
display:inline-block;
margin-top:15px;
padding:8px 18px;
border-radius:30px;
background:linear-gradient(135deg,#9333ea,#7c3aed);
font-size:13px;
font-weight:600;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:22px;
margin-top:35px;
}

.stat-card{
background:rgba(255,255,255,0.06);
padding:30px;
border-radius:22px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
position:relative;
overflow:hidden;
}

.stat-card::before{
content:"";
position:absolute;
width:150px;
height:150px;
background:rgba(168,85,247,0.15);
border-radius:50%;
top:-60px;
right:-60px;
}

.stat-card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(168,85,247,0.35);
}

.stat-card h3{
font-size:36px;
color:#c084fc;
margin-bottom:10px;
}

.stat-card p{
color:#d1d5db;
}

/* BUTTONS */

.actions{
display:flex;
gap:18px;
margin-top:40px;
flex-wrap:wrap;
}

.btn{
padding:15px 28px;
border-radius:16px;
text-decoration:none;
font-weight:600;
color:white;
transition:0.3s;
border:none;
cursor:pointer;
font-size:15px;
}

.edit{
background:linear-gradient(135deg,#9333ea,#7c3aed);
box-shadow:0 0 20px rgba(168,85,247,0.4);
}

.home{
background:linear-gradient(135deg,#3b82f6,#2563eb);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.logout{
background:linear-gradient(135deg,#ec4899,#db2777);
box-shadow:0 0 20px rgba(236,72,153,0.4);
}

.btn:hover{
transform:translateY(-4px) scale(1.03);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
width:420px;
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:28px;
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(168,85,247,0.4);
}

.popup-box h2{
text-align:center;
margin-bottom:25px;
font-size:30px;
}

.popup-box input{
width:100%;
padding:15px;
margin-top:14px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

.popup-box button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#9333ea,#7c3aed);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.close-btn{
background:linear-gradient(135deg,#ef4444,#dc2626) !important;
}

/* MOBILE */

@media(max-width:700px){

.profile-top{
flex-direction:column;
text-align:center;
}

.profile-info h2{
font-size:28px;
}

.logo{
font-size:26px;
}

nav{
flex-direction:column;
gap:15px;
}

}

</style>

</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- NAV -->

<nav>

<div class="logo">
🧠 QuizHub
</div>

<div class="nav">

<a href="/home">
🏠 Home
</a>

<a href="/create">
➕ Create
</a>

<a href="/profile">
👤 Profile
</a>

</div>

</nav>

<!-- PROFILE -->

<div class="container">

<div class="profile-card">

<div class="profile-top">

<div class="body-box">
👤
</div>

<div class="profile-info">

<h2>
{{ name }}
</h2>

<p>
📧 {{ email }}
</p>

<p>
🚀 Welcome To QuizHub Dashboard
</p>

<div class="badge">
👤 USER PROFILE
</div>

</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">

<h3>
{{ quiz_count }}
</h3>

<p>
Total Quizzes
</p>

</div>

<div class="stat-card">

<h3>
ACTIVE
</h3>

<p>
Account Status
</p>

</div>

</div>

<!-- BUTTONS -->

<div class="actions">

<button class="btn edit"
onclick="openPopup()">

✏️ Edit Profile

</button>

<a href="/home"
class="btn home">

🏠 Go Home

</a>

<a href="/logout"
class="btn logout">

🚪 Logout

</a>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup"
id="popup">

<div class="popup-box">

<h2>
✏️ Edit Profile
</h2>

<form method="POST"
action="/update-profile">

<input type="text"
name="name"
placeholder="Enter New Name"
value="{{ name }}"
required>

<input type="email"
name="email"
placeholder="Enter New Email"
value="{{ email }}"
required>

<button type="submit">
💾 Save Changes
</button>

<button type="button"
class="close-btn"
onclick="closePopup()">

❌ Cancel

</button>

</form>

</div>

</div>

<script>

function openPopup(){

document.getElementById("popup").style.display =
"flex";

}

function closePopup(){

document.getElementById("popup").style.display =
"none";

}

</script>

</body>

</html>
