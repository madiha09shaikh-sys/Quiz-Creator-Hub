..............................<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizHub - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#070414,#140b2c,#1b1140);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND */

.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
z-index:-1;
opacity:0.6;
animation:float 8s infinite ease-in-out;
}

.circle1{
width:320px;
height:320px;
background:#9333ea;
top:-120px;
left:-100px;
}

.circle2{
width:280px;
height:280px;
background:#3b82f6;
bottom:-120px;
right:-100px;
}

@keyframes float{
50%{
transform:translateY(30px);
}
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:30px;
font-weight:800;
background:linear-gradient(90deg,#c084fc,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav a{
color:#ddd;
margin-left:15px;
text-decoration:none;
transition:0.3s;
}

.nav a:hover{
color:#a855f7;
}

/* MAIN */

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

/* PROFILE CARD */

.profile-card{
display:flex;
align-items:center;
gap:25px;
padding:35px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(18px);
border-radius:25px;
border:1px solid rgba(255,255,255,0.1);
position:relative;
overflow:hidden;
}

.profile-card::before{
content:"";
position:absolute;
width:220px;
height:220px;
background:rgba(168,85,247,0.2);
border-radius:50%;
top:-60px;
right:-60px;
filter:blur(40px);
}

/* ICON */

.profile-icon{
width:110px;
height:110px;
border-radius:50%;
background:linear-gradient(135deg,#9333ea,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
box-shadow:0 0 30px rgba(168,85,247,0.5);
}

.profile-info h2{
font-size:30px;
margin-bottom:8px;
}

.profile-info p{
color:#bbb;
margin-top:5px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.stat-card{
background:rgba(255,255,255,0.06);
padding:28px;
border-radius:22px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-8px);
box-shadow:0 0 30px rgba(168,85,247,0.3);
}

.stat-card h3{
font-size:32px;
color:#a855f7;
margin-bottom:10px;
}

/* BUTTONS */

.actions{
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
padding:14px 25px;
border-radius:15px;
text-decoration:none;
font-weight:600;
color:white;
transition:0.3s;
border:none;
cursor:pointer;
font-size:15px;
}

.edit{
background:linear-gradient(135deg,#9333ea,#7c3aed);
}

.logout{
background:linear-gradient(135deg,#ec4899,#db2777);
}

.btn:hover{
transform:translateY(-4px);
}

/* EDIT POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
width:420px;
background:#1e1b4b;
padding:35px;
border-radius:25px;
box-shadow:0 0 35px rgba(168,85,247,0.5);
}

.popup-box h2{
text-align:center;
margin-bottom:25px;
}

.popup-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
color:white;
margin-top:15px;
font-size:15px;
}

.popup-box button{
width:100%;
padding:15px;
margin-top:22px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#9333ea,#7c3aed);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.profile-card{
flex-direction:column;
text-align:center;
}

.profile-info h2{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- NAV -->

<nav>

<div class="logo">
🧠 QuizHub
</div>

<div class="nav">

<a href="/home">
Home
</a>

<a href="/create">
Create
</a>

<a href="/profile">
Profile
</a>

</div>

</nav>

<!-- PROFILE -->

<div class="container">

<div class="profile-card">

<div class="profile-icon">
👤
</div>

<div class="profile-info">

<h2 id="profileName">
{{ name }}
</h2>

<p>
📧 {{ email }}
</p>

<p>
🚀 QuizHub Premium User
</p>

</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">

<h3>
{{ quiz_count }}
</h3>

<p>
Total Quizzes
</p>

</div>

<div class="stat-card">

<h3>
PRO
</h3>

<p>
Account Status
</p>

</div>

<div class="stat-card">

<h3>
∞
</h3>

<p>
Unlimited Access
</p>

</div>

</div>

<!-- BUTTONS -->

<div class="actions">

<button class="btn edit"
onclick="openEdit()">

✏️ Edit Profile

</button>

<a href="/logout"
class="btn logout">

🚪 Logout

</a>

</div>

</div>

<!-- EDIT POPUP -->

<div class="popup"
id="popup">

<div class="popup-box">

<h2>
✏️ Edit Profile
</h2>

<input type="text"
id="newName"
placeholder="Enter New Name"
value="{{ name }}">

<button onclick="saveProfile()">

Save Changes

</button>

</div>

</div>

<script>

function openEdit(){

document.getElementById("popup").style.display =
"flex";

}

function saveProfile(){

let newName =
document.getElementById("newName").value.trim();

if(!newName){

alert("Enter Name");

return;

}

fetch("/update-profile",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:newName

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

document.getElementById("profileName").innerText =
newName;

document.getElementById("popup").style.display =
"none";

alert("✅ Profile Updated");

}else{

alert("Update Failed");

}

})

.catch(()=>{

alert("Server Error");

});

}

</script>

</body>

</html>
