<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Quiz......</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
flex-wrap:wrap;
gap:10px;
}

.logo{
color:#a855f7;
font-size:24px;
font-weight:600;
}

nav button{
border:none;
background:#a855f7;
color:white;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-size:14px;
}

/* CONTAINER */

.container{
max-width:760px;
margin:20px auto;
padding:15px;
}

/* SECTION */

.section{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:16px;
margin-top:16px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.05);
}

/* MODE BUTTONS */

.mode-buttons{
display:flex;
gap:10px;
}

.mode-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.active{
background:linear-gradient(135deg,#a855f7,#6d28d9) !important;
}

/* INPUTS */

input,
select,
textarea{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
font-size:14px;
}

input::placeholder,
textarea::placeholder{
color:#d1d5db;
}

select option{
color:black;
}

/* OPTION */

.option{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.option input[type="radio"]{
width:18px;
height:18px;
}

/* BUTTON */

.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-weight:600;
cursor:pointer;
margin-top:14px;
font-size:15px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.02);
}

/* QUESTION BOX */

.question-box{
background:rgba(255,255,255,0.07);
padding:15px;
border-radius:14px;
margin-top:12px;
line-height:1.8;
font-size:14px;
}

.option-item{
margin-top:8px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
}

/* AI LOADING */

.ai-loading{
margin-top:15px;
text-align:center;
color:#c084fc;
font-weight:600;
}

/* MOBILE */

@media(max-width:700px){

nav{
padding:15px;
}

.logo{
font-size:20px;
}

.container{
padding:12px;
}

.mode-buttons{
flex-direction:column;
}

.option{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<!-- NAV -->

<nav>

<div class="logo">
🧠 Quiz Pro
</div>

<button onclick="window.location.href='/home'">
⬅ Home
</button>

</nav>

<!-- CONTAINER -->

<div class="container">

<h2>Create Quiz</h2>

<!-- MODE -->

<div class="section">

<div class="mode-buttons">

<button id="manualBtn"
class="active"
onclick="showManual()">

Manual

</button>

<button id="aiBtn"
onclick="showAI()">

AI Mode

</button>

</div>

</div>

<!-- MANUAL -->

<div id="manual"
class="section">

<input id="question"
placeholder="Enter Question">

<div class="option">

<input id="opt1"
placeholder="Option 1">

<input type="radio"
name="correct"
value="0">

</div>

<div class="option">

<input id="opt2"
placeholder="Option 2">

<input type="radio"
name="correct"
value="1">

</div>

<div class="option">

<input id="opt3"
placeholder="Option 3">

<input type="radio"
name="correct"
value="2">

</div>

<div class="option">

<input id="opt4"
placeholder="Option 4">

<input type="radio"
name="correct"
value="3">

</div>

<button class="btn"
onclick="addQuestion()">

➕ Add Question

</button>

</div>

<!-- AI MODE -->

<div id="ai"
class="section"
style="display:none;">

<input id="topic"
placeholder="Enter Topic (Python, Java, Science, History etc...)">

<input id="qcount"
type="number"
placeholder="Number of Questions">

<select id="level">

<option value="">
Select Difficulty
</option>

<option value="easy">
Easy
</option>

<option value="medium">
Medium
</option>

<option value="hard">
Hard
</option>

</select>

<button class="btn"
onclick="generateAI()">

🤖 Generate AI Questions

</button>

<div id="aiLoading"
class="ai-loading">
</div>

</div>

<!-- QUESTIONS -->

<div class="section">

<h3>
📚 Questions
</h3>

<div id="questions"></div>

</div>

<!-- DETAILS -->

<div class="section">

<h3>
📝 Quiz Details
</h3>

<input id="title"
placeholder="Quiz Title">

<input id="desc"
placeholder="Description">

</div>

<!-- SETTINGS -->

<div class="section">

<h3>
⚙ Settings
</h3>

<div style="display:flex; gap:10px;">

<input id="hours"
type="number"
placeholder="Hours">

<input id="minutes"
type="number"
placeholder="Minutes">

</div>

<label style="display:block; margin-top:15px;">

<input type="checkbox"
id="negativeCheck"
onclick="toggleNegative()">

Enable Negative Marking

</label>

<input id="negativeValue"
placeholder="Negative Marks"
style="display:none;">

<button class="btn"
onclick="saveQuiz()">

💾 Save Quiz

</button>

</div>

</div>

<script>

/* ================= DATA ================= */

let questions = [];

let usedQuestions = new Set();

/* ================= NEGATIVE ================= */

function toggleNegative(){

let check =
document.getElementById(
"negativeCheck"
).checked;

document.getElementById(
"negativeValue"
).style.display =

check
?
"block"
:
"none";

}

/* ================= MODE ================= */

function showManual(){

document.getElementById(
"manual"
).style.display = "block";

document.getElementById(
"ai"
).style.display = "none";

manualBtn.classList.add(
"active"
);

aiBtn.classList.remove(
"active"
);

}

function showAI(){

document.getElementById(
"manual"
).style.display = "none";

document.getElementById(
"ai"
).style.display = "block";

aiBtn.classList.add(
"active"
);

manualBtn.classList.remove(
"active"
);

}

/* ================= MANUAL QUESTION ================= */

function addQuestion(){

let q =
document.getElementById(
"question"
).value.trim();

let options = [

opt1.value.trim(),
opt2.value.trim(),
opt3.value.trim(),
opt4.value.trim()

];

let correct =
document.querySelector(
'input[name="correct"]:checked'
);

if(
!q ||
options.includes("") ||
!correct
){

alert("Fill all fields");
return;

}

questions.push({

q:q,
options:options,
correct:parseInt(correct.value)

});

renderQuestions();

/* RESET */

question.value="";
opt1.value="";
opt2.value="";
opt3.value="";
opt4.value="";

document.querySelectorAll(
'input[name="correct"]'
).forEach(r=>r.checked=false);

}

/* ================= REAL AI ================= */

async function generateAI(){

let topic =
document.getElementById(
"topic"
).value.trim();

let count =
parseInt(
document.getElementById(
"qcount"
).value
);

let level =
document.getElementById(
"level"
).value;

if(!topic || !count || !level){

alert("Fill all AI fields");
return;

}

document.getElementById(
"aiLoading"
).innerText =
"🤖 Generating Smart AI Questions...";

try{

let response = await fetch(

"/generate-ai-quiz",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

topic:topic,
count:count,
level:level

})

}

);

let data = await response.json();

console.log(data);

if(data.success){

let added = 0;

data.questions.forEach(q=>{

/* duplicate skip */

if(
!usedQuestions.has(
q.q.toLowerCase()
)
){

usedQuestions.add(
q.q.toLowerCase()
);

/* option validation */

if(
q.options &&
q.options.length === 4
){

/* remove duplicate options */

let uniqueOptions =
[...new Set(q.options)];

if(uniqueOptions.length === 4){

questions.push({

q:q.q,

options:uniqueOptions,

correct:q.correct

});

added++;

}

}

}

});

renderQuestions();

document.getElementById(
"aiLoading"
).innerText =

`✅ ${added} AI Questions Generated`;

}else{

document.getElementById(
"aiLoading"
).innerText =

"❌ AI Failed";

alert(data.message);

}

}catch(err){

console.log(err);

document.getElementById(
"aiLoading"
).innerText =

"❌ Server Error";

}

}

/* ================= RENDER ================= */

function renderQuestions(){

let box =
document.getElementById(
"questions"
);

box.innerHTML = "";

questions.forEach((q,i)=>{

box.innerHTML += `

<div class="question-box">

<b>
Q${i+1}:
</b>

${q.q}

<br><br>

${q.options.map((o,index)=>`

<div class="option-item"
style="
background:
${index==q.correct
?
'rgba(34,197,94,0.25)'
:
'rgba(255,255,255,0.05)'
};
">

${index==q.correct ? "✅" : "⭕"}

${o}

</div>

`).join("")}

</div>

`;

});

}

/* ================= SAVE QUIZ ================= */

function saveQuiz(){

let title =
document.getElementById(
"title"
).value.trim();

let desc =
document.getElementById(
"desc"
).value.trim();

let hoursVal =
parseInt(
document.getElementById(
"hours"
).value || 0
);

let minutesVal =
parseInt(
document.getElementById(
"minutes"
).value || 0
);

let totalTime =
(hoursVal * 60)
+
minutesVal;

let negativeEnabled =
document.getElementById(
"negativeCheck"
).checked;

let negativeMarks =
document.getElementById(
"negativeValue"
).value;

if(title.length < 3){

alert("Enter title");
return;

}

if(questions.length == 0){

alert("Add questions");
return;

}

if(totalTime <= 0){

alert("Enter duration");
return;

}

let code =

"QUIZ" +

Math.floor(
Math.random()*100000
);

fetch("/save-quiz",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

code:code,

title:title,

description:desc,

questions:questions,

duration:totalTime,

negative:negativeEnabled,

negativeMarks:
negativeMarks || 0,

is_started:false

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert(
"✅ Quiz Saved Successfully"
);

window.location.href =
"/home";

}else{

alert(
"❌ Save Failed"
);

}

})

.catch(err=>{

console.log(err);

alert(
"❌ Server Error"
);

});

}

</script>

</body>
</html>
