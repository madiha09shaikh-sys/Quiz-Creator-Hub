<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
flex-wrap:wrap;
gap:10px;
}

.logo{
font-size:24px;
font-weight:700;
color:#c084fc;
}

nav button{
padding:10px 18px;
border:none;
border-radius:12px;
background:#a855f7;
color:white;
font-weight:600;
cursor:pointer;
}

.container{
max-width:850px;
margin:20px auto;
padding:15px;
}

.section{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:18px;
margin-top:16px;
backdrop-filter:blur(10px);
}

.mode-buttons{
display:flex;
gap:10px;
}

.mode-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.active{
background:linear-gradient(135deg,#a855f7,#6d28d9)!important;
}

input,
select{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
font-size:14px;
}

select option{
color:black;
}

.option{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.option input[type="radio"]{
width:18px;
height:18px;
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-weight:600;
cursor:pointer;
margin-top:14px;
font-size:15px;
}

.question-box{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:14px;
margin-top:12px;
line-height:1.8;
}

.ai-loading{
margin-top:15px;
text-align:center;
font-weight:600;
color:#c084fc;
}

@media(max-width:700px){

.mode-buttons{
flex-direction:column;
}

.option{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
🧠 Quiz Pro
</div>

<button onclick="window.location.href='/home'">
⬅ Home
</button>

</nav>

<div class="container">

<h2>Create Quiz</h2>

<!-- MODE -->

<div class="section">

<div class="mode-buttons">

<button id="manualBtn"
class="active"
onclick="showManual()">

Manual

</button>

<button id="aiBtn"
onclick="showAI()">

AI Mode

</button>

</div>

</div>

<!-- MANUAL -->

<div id="manual"
class="section">

<input id="question"
placeholder="Enter Question">

<div class="option">

<input id="opt1"
placeholder="Option 1">

<input type="radio"
name="correct"
value="0">

</div>

<div class="option">

<input id="opt2"
placeholder="Option 2">

<input type="radio"
name="correct"
value="1">

</div>

<div class="option">

<input id="opt3"
placeholder="Option 3">

<input type="radio"
name="correct"
value="2">

</div>

<div class="option">

<input id="opt4"
placeholder="Option 4">

<input type="radio"
name="correct"
value="3">

</div>

<button class="btn"
onclick="addQuestion()">

➕ Add Question

</button>

</div>

<!-- AI -->

<div id="ai"
class="section"
style="display:none;">

<input id="topic"
placeholder="Enter Topic">

<input id="qcount"
type="number"
placeholder="Number of Questions">

<select id="level">

<option value="">
Select Difficulty
</option>

<option value="easy">
Easy
</option>

<option value="medium">
Medium
</option>

<option value="hard">
Hard
</option>

</select>

<button class="btn"
onclick="generateAI()">

🤖 Generate AI Questions

</button>

<div id="aiLoading"
class="ai-loading">
</div>

</div>

<!-- QUESTIONS -->

<div class="section">

<h3>
📚 Questions
</h3>

<div id="questions"></div>

</div>

</div>

<script>

let questions = [];
let usedQuestions = new Set();

/* MODE */

function showManual(){

document.getElementById("manual").style.display="block";

document.getElementById("ai").style.display="none";

manualBtn.classList.add("active");

aiBtn.classList.remove("active");

}

function showAI(){

document.getElementById("manual").style.display="none";

document.getElementById("ai").style.display="block";

aiBtn.classList.add("active");

manualBtn.classList.remove("active");

}

/* MANUAL QUESTION */

function addQuestion(){

let q = document.getElementById("question").value.trim();

let options = [

document.getElementById("opt1").value.trim(),

document.getElementById("opt2").value.trim(),

document.getElementById("opt3").value.trim(),

document.getElementById("opt4").value.trim()

];

let correct = document.querySelector('input[name="correct"]:checked');

if(!q || options.includes("") || !correct){

alert("Fill all fields");

return;

}

/* duplicate options check */

let uniqueOptions = [...new Set(options)];

if(uniqueOptions.length !== 4){

alert("All options must be different");

return;

}

/* duplicate question check */

if(usedQuestions.has(q.toLowerCase())){

alert("Question already added");

return;

}

usedQuestions.add(q.toLowerCase());

questions.push({

q:q,

options:options,

correct:parseInt(correct.value)

});

renderQuestions();

/* RESET */

document.getElementById("question").value="";

document.getElementById("opt1").value="";

document.getElementById("opt2").value="";

document.getElementById("opt3").value="";

document.getElementById("opt4").value="";

document.querySelectorAll('input[name="correct"]').forEach(r=>r.checked=false);

}

/* AI GENERATE */

async function generateAI(){

let topic = document.getElementById("topic").value.trim();

let count = parseInt(document.getElementById("qcount").value);

let level = document.getElementById("level").value;

if(!topic || !count || !level){

alert("Fill all AI fields");

return;

}

document.getElementById("aiLoading").innerText =
"🤖 AI Generating Questions...";

try{

let response = await fetch("/generate-ai-quiz",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

topic:topic,

count:count,

level:level

})

});

let data = await response.json();

if(data.success){

let added = 0;

data.questions.forEach(q=>{

/* question duplicate */

if(usedQuestions.has(q.q.toLowerCase())){

return;

}

/* option duplicate */

let uniqueOptions = [...new Set(q.options)];

if(uniqueOptions.length !== 4){

return;

}

usedQuestions.add(q.q.toLowerCase());

questions.push({

q:q.q,

options:q.options,

correct:q.correct

});

added++;

});

renderQuestions();

document.getElementById("aiLoading").innerText =
`✅ ${added} AI Questions Generated`;

}else{

document.getElementById("aiLoading").innerText =
"❌ AI Failed";

alert(data.message);

}

}catch(err){

console.log(err);

document.getElementById("aiLoading").innerText =
"❌ Server Error";

}

}

/* RENDER QUESTIONS */

function renderQuestions(){

let box = document.getElementById("questions");

box.innerHTML = "";

questions.forEach((q,i)=>{

box.innerHTML += `

<div class="question-box">

<b>
Q${i+1}:
</b>

${q.q}

<br><br>

${q.options.map((o,index)=>`

<div>

${index == q.correct ? "✅" : "⭕"}

${o}

</div>

`).join("")}

</div>

`;

});

}

</script>

</body>
</html>
