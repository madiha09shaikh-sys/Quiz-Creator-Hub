<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
    min-height:100vh;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    flex-wrap:wrap;
    gap:12px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.logo{
    color:#a855f7;
    font-size:24px;
    font-weight:700;
}

.home-btn{
    border:none;
    background:#a855f7;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

/* MAIN */

.container{
    width:95%;
    max-width:760px;
    margin:20px auto;
}

/* SECTION */

.section{
    background:rgba(255,255,255,0.06);
    padding:18px;
    border-radius:18px;
    margin-top:16px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.06);
}

/* MODE */

.mode-buttons{
    display:flex;
    gap:10px;
}

.mode-buttons button{
    flex:1;
    border:none;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.active{
    background:linear-gradient(135deg,#a855f7,#6d28d9) !important;
}

/* INPUTS */

input,
select,
textarea{
    width:100%;
    padding:13px;
    margin-top:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:14px;
}

input::placeholder,
textarea::placeholder{
    color:#d1d5db;
}

select option{
    color:black;
}

/* OPTION */

.option{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.option input[type="radio"]{
    width:18px;
    height:18px;
}

/* BUTTON */

.btn{
    width:100%;
    border:none;
    padding:13px;
    border-radius:12px;
    background:linear-gradient(135deg,#a855f7,#6d28d9);
    color:white;
    cursor:pointer;
    font-weight:600;
    margin-top:14px;
    font-size:15px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.01);
}

/* QUESTIONS */

.question-box{
    background:rgba(255,255,255,0.07);
    padding:16px;
    border-radius:14px;
    margin-top:14px;
    line-height:1.8;
}

.question-title{
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
}

.answer{
    color:#22c55e;
    font-weight:600;
}

.option-item{
    background:rgba(255,255,255,0.06);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
}

/* AI STATUS */

.ai-loading{
    margin-top:15px;
    text-align:center;
    color:#c084fc;
    font-weight:600;
}

/* MOBILE */

@media(max-width:700px){

    nav{
        padding:15px;
    }

    .logo{
        font-size:20px;
    }

    .mode-buttons{
        flex-direction:column;
    }

    .option{
        flex-direction:column;
        align-items:flex-start;
    }

    .home-btn{
        padding:8px 14px;
        font-size:13px;
    }

    .btn{
        font-size:14px;
        padding:12px;
    }

}

</style>
</head>

<body>

<!-- NAV -->

<nav>

<div class="logo">
🧠 Quiz Pro
</div>

<button class="home-btn"
onclick="window.location.href='/home'">

⬅ Home

</button>

</nav>

<!-- MAIN -->

<div class="container">

<h2>Create Quiz</h2>

<!-- MODE -->

<div class="section">

<div class="mode-buttons">

<button id="manualBtn"
class="active"
onclick="showManual()">

Manual

</button>

<button id="aiBtn"
onclick="showAI()">

AI Mode

</button>

</div>

</div>

<!-- MANUAL -->

<div id="manual"
class="section">

<input id="question"
placeholder="Enter Question">

<div class="option">

<input id="opt1"
placeholder="Option 1">

<input type="radio"
name="correct"
value="0">

</div>

<div class="option">

<input id="opt2"
placeholder="Option 2">

<input type="radio"
name="correct"
value="1">

</div>

<div class="option">

<input id="opt3"
placeholder="Option 3">

<input type="radio"
name="correct"
value="2">

</div>

<div class="option">

<input id="opt4"
placeholder="Option 4">

<input type="radio"
name="correct"
value="3">

</div>

<button class="btn"
onclick="addQuestion()">

➕ Add Question

</button>

</div>

<!-- AI MODE -->

<div id="ai"
class="section"
style="display:none;">

<input id="topic"
placeholder="Enter Any Topic (Example: Python Inheritance)">

<input id="qcount"
type="number"
placeholder="Number of Questions">

<select id="level">

<option value="">
Select Difficulty
</option>

<option value="easy">
Easy
</option>

<option value="medium">
Medium
</option>

<option value="hard">
Hard
</option>

</select>

<button class="btn"
onclick="generateAI()">

🤖 Generate AI Questions

</button>

<div id="aiLoading"
class="ai-loading">
</div>

</div>

<!-- QUESTIONS -->

<div class="section">

<h3>
📚 Questions
</h3>

<div id="questions"></div>

</div>

<!-- DETAILS -->

<div class="section">

<h3>
📝 Quiz Details
</h3>

<input id="title"
placeholder="Quiz Title">

<input id="desc"
placeholder="Description">

</div>

<!-- SETTINGS -->

<div class="section">

<h3>
⚙ Settings
</h3>

<div style="display:flex; gap:10px;">

<input id="hours"
type="number"
placeholder="Hours">

<input id="minutes"
type="number"
placeholder="Minutes">

</div>

<label style="display:block; margin-top:15px;">

<input type="checkbox"
id="negativeCheck"
onclick="toggleNegative()">

Enable Negative Marking

</label>

<input id="negativeValue"
placeholder="Negative Marks"
style="display:none;">

<button class="btn"
onclick="saveQuiz()">

💾 Save Quiz

</button>

</div>

</div>

<script>

let questions = [];

/* NEGATIVE */

function toggleNegative(){

let check =
document.getElementById(
"negativeCheck"
).checked;

document.getElementById(
"negativeValue"
).style.display =

check
?
"block"
:
"none";

}

/* MODE */

function showManual(){

document.getElementById(
"manual"
).style.display = "block";

document.getElementById(
"ai"
).style.display = "none";

manualBtn.classList.add(
"active"
);

aiBtn.classList.remove(
"active"
);

}

function showAI(){

document.getElementById(
"manual"
).style.display = "none";

document.getElementById(
"ai"
).style.display = "block";

aiBtn.classList.add(
"active"
);

manualBtn.classList.remove(
"active"
);

}

/* MANUAL QUESTION */

function addQuestion(){

let q =
document.getElementById(
"question"
).value.trim();

let options = [

opt1.value.trim(),
opt2.value.trim(),
opt3.value.trim(),
opt4.value.trim()

];

let correct =
document.querySelector(
'input[name="correct"]:checked'
);

if(
!q ||
options.includes("") ||
!correct
){

alert("Fill all fields");

return;

}

questions.push({

q:q,

options:options,

correct:
parseInt(correct.value)

});

renderQuestions();

/* RESET */

question.value = "";
opt1.value = "";
opt2.value = "";
opt3.value = "";
opt4.value = "";

document.querySelectorAll(
'input[name="correct"]'
).forEach(r=>r.checked=false);

}

/* AI GENERATOR */

function generateAI(){

let topic =
document.getElementById(
"topic"
).value.trim();

let count =
parseInt(
document.getElementById(
"qcount"
).value
);

let level =
document.getElementById(
"level"
).value;

if(!topic || !count || !level){

alert("Fill all AI fields");

return;

}

document.getElementById(
"aiLoading"
).innerText =
"🤖 AI Generating Questions...";

/* CLEAR OLD */

setTimeout(()=>{

for(let i=1;i<=count;i++){

let q = "";
let options = [];
let correct = 0;

/* PYTHON */

if(topic.toLowerCase().includes("python")){

q = `What is Python used for?`;

options = [
"Web Development",
"AI & ML",
"Automation",
"All of these"
];

correct = 3;

}

/* INHERITANCE */

else if(topic.toLowerCase().includes("inheritance")){

q = `What is inheritance in OOP?`;

options = [
"Copying file",
"Taking properties from another class",
"Deleting class",
"Creating database"
];

correct = 1;

}

/* HTML */

else if(topic.toLowerCase().includes("html")){

q = `Which tag is used to create link in HTML?`;

options = [
"<img>",
"<a>",
"<p>",
"<table>"
];

correct = 1;

}

/* JAVA */

else if(topic.toLowerCase().includes("java")){

q = `Java is which type of language?`;

options = [
"Programming Language",
"Database",
"Operating System",
"Browser"
];

correct = 0;

}

/* MATH */

else if(topic.toLowerCase().includes("math")){

q = `What is value of 5 + 5 ?`;

options = [
"8",
"10",
"12",
"15"
];

correct = 1;

}

/* DEFAULT */

else{

q = `What is ${topic}?`;

options = [
`${topic} Concept`,
`${topic} Programming`,
`${topic} Technology`,
`All of these`
];

correct = 3;

}

questions.push({

q:q,

options:options,

correct:correct

});

}

renderQuestions();

document.getElementById(
"aiLoading"
).innerText =
"✅ AI Questions Generated Successfully";

},1000);

}

/* RENDER QUESTIONS */

function renderQuestions(){

let box =
document.getElementById(
"questions"
);

box.innerHTML = "";

questions.forEach((q,i)=>{

box.innerHTML += `

<div class="question-box">

<div class="question-title">

Q${i+1}. ${q.q}

</div>

${q.options.map((o,index)=>`

<div class="option-item">

${index==q.correct ? "✅" : "⭕"}

${o}

</div>

`).join("")}

</div>

`;

});

}

/* SAVE QUIZ */

function saveQuiz(){

let title =
document.getElementById(
"title"
).value.trim();

let desc =
document.getElementById(
"desc"
).value.trim();

let hoursVal =
parseInt(
document.getElementById(
"hours"
).value || 0
);

let minutesVal =
parseInt(
document.getElementById(
"minutes"
).value || 0
);

let totalTime =
(hoursVal * 60)
+
minutesVal;

let negativeEnabled =
document.getElementById(
"negativeCheck"
).checked;

let negativeMarks =
document.getElementById(
"negativeValue"
).value;

if(title.length < 3){

alert("Enter title");

return;

}

if(questions.length == 0){

alert("Add questions");

return;

}

if(totalTime <= 0){

alert("Enter duration");

return;

}

let code =

"QUIZ" +

Math.floor(
Math.random()*100000
);

fetch("/save-quiz",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

code:code,

title:title,

description:desc,

questions:questions,

duration:totalTime,

negative:negativeEnabled,

negativeMarks:
negativeMarks || 0,

is_started:false

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert(
"✅ Quiz Saved Successfully"
);

window.location.href =
"/home";

}

else{

alert(
"❌ Save Failed"
);

}

})

.catch(err=>{

console.log(err);

alert(
"❌ Server Error"
);

});

}

</script>

</body>
</html>
