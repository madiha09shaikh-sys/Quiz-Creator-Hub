<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Poppins;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
}

nav{
display:flex;
justify-content:space-between;
padding:15px;
flex-wrap:wrap;
gap:10px;
}

.logo{color:#a855f7;font-size:22px;font-weight:700;}

.container{max-width:750px;margin:20px auto;padding:15px;}

.section{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:15px;
margin-top:15px;
}

.mode-buttons{display:flex;gap:10px;}

.mode-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
font-weight:600;
}

.active{
background:linear-gradient(135deg,#a855f7,#6d28d9);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.question-box{
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:12px;
margin-top:10px;
}

.ai-loading{
margin-top:10px;
color:#c084fc;
font-weight:600;
}
</style>
</head>

<body>

<nav>
<div class="logo">🧠 Quiz Pro</div>
<button onclick="window.location.href='/home'">⬅ Home</button>
</nav>

<div class="container">

<h2>Create Quiz</h2>

<div class="section">
<div class="mode-buttons">
<button id="manualBtn" class="active" onclick="showManual()">Manual</button>
<button id="aiBtn" onclick="showAI()">AI Mode</button>
</div>
</div>

<!-- MANUAL -->
<div id="manual" class="section">

<input id="question" placeholder="Enter Question">

<div class="option"><input id="opt1" placeholder="Option 1"><input type="radio" name="correct" value="0"></div>
<div class="option"><input id="opt2" placeholder="Option 2"><input type="radio" name="correct" value="1"></div>
<div class="option"><input id="opt3" placeholder="Option 3"><input type="radio" name="correct" value="2"></div>
<div class="option"><input id="opt4" placeholder="Option 4"><input type="radio" name="correct" value="3"></div>

<button class="btn" onclick="addQuestion()">➕ Add Question</button>
</div>

<!-- AI -->
<div id="ai" class="section" style="display:none;">

<input id="topic" placeholder="Enter Topic">
<input id="qcount" type="number" placeholder="Number of Questions">

<select id="level">
<option value="">Select Difficulty</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button class="btn" onclick="generateAI()">🤖 Generate AI</button>

<div id="aiLoading" class="ai-loading"></div>
</div>

<!-- QUESTIONS -->
<div class="section">
<h3>Questions</h3>
<div id="questions"></div>
</div>

</div>

<script>

let questions = [];
let usedQuestions = new Set(); // ✅ no duplicate questions

function showManual(){
manual.style.display="block";
ai.style.display="none";
manualBtn.classList.add("active");
aiBtn.classList.remove("active");
}

function showAI(){
manual.style.display="none";
ai.style.display="block";
aiBtn.classList.add("active");
manualBtn.classList.remove("active");
}

/* MANUAL */
function addQuestion(){

let q = question.value.trim();
let options = [opt1.value,opt2.value,opt3.value,opt4.value];
let correct = document.querySelector('input[name="correct"]:checked');

if(!q || options.includes("") || !correct){
alert("Fill all fields");
return;
}

questions.push({
q,
options,
correct:parseInt(correct.value)
});

render();
}

/* =========================
🔥 REAL AI FIX (BACKEND CALL)
========================= */

async function generateAI(){

let topic = document.getElementById("topic").value.trim();
let count = parseInt(document.getElementById("qcount").value);
let level = document.getElementById("level").value;

if(!topic || !count || !level){
alert("Fill all fields");
return;
}

document.getElementById("aiLoading").innerText = "🤖 Generating AI Questions...";

try{

let res = await fetch("/generate-ai-quiz",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
topic,
count,
level
})
});

let data = await res.json();

if(data.success){

// 🔥 remove duplicates
data.questions.forEach(q=>{
if(!usedQuestions.has(q.q)){
usedQuestions.add(q.q);
questions.push(q);
}
});

render();

document.getElementById("aiLoading").innerText =
"✅ AI Questions Generated";

}else{
document.getElementById("aiLoading").innerText =
"❌ AI Failed";
}

}catch(err){
console.log(err);
document.getElementById("aiLoading").innerText =
"❌ Server Error";
}

}

/* RENDER */
function render(){

let box = document.getElementById("questions");
box.innerHTML = "";

questions.forEach((q,i)=>{

box.innerHTML += `
<div class="question-box">
<b>Q${i+1}:</b> ${q.q}<br><br>

${q.options.map((o,idx)=>`
${idx==q.correct?"✅":""} ${o}<br>
`).join("")}

</div>
`;

});

}

</script>

</body>
</html>
