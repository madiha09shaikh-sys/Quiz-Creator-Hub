<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Play Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
overflow-x:hidden;
}

nav{
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:600;
color:#a855f7;
}

.container{
max-width:950px;
margin:25px auto;
padding:15px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
width:430px;
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:25px;
backdrop-filter:blur(15px);
box-shadow:0 0 35px rgba(168,85,247,0.5);
}

.popup-box h2{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

.popup-box input{
width:100%;
padding:15px;
margin-top:14px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

.popup-box button{
width:100%;
padding:15px;
margin-top:22px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.waiting{
display:none;
min-height:80vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:40px 20px;
}

.quiz-box{
display:none;
background:rgba(255,255,255,0.06);
padding:28px;
border-radius:25px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.quiz-title{
font-size:30px;
font-weight:600;
}

.timer{
background:#ef4444;
padding:12px 20px;
border-radius:12px;
font-size:20px;
font-weight:bold;
}

.progress{
margin-bottom:20px;
color:#ccc;
font-size:16px;
}

.question{
font-size:25px;
line-height:1.6;
margin-bottom:20px;
}

.option{
background:rgba(255,255,255,0.07);
padding:18px;
border-radius:15px;
margin-top:14px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
font-size:16px;
}

.option:hover{
background:#7c3aed;
}

.selected{
background:#9333ea;
border:2px solid #c084fc;
}

.btns{
display:flex;
gap:12px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
padding:14px 24px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:15px;
font-weight:600;
color:white;
}

.prev{
background:#3b82f6;
}

.next{
background:#22c55e;
}

.finish{
background:#ef4444;
}

.complete-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
z-index:99999;
}

.complete-card{
width:520px;
background:rgba(255,255,255,0.08);
padding:45px;
border-radius:30px;
text-align:center;
backdrop-filter:blur(15px);
}

.complete-card h1{
font-size:52px;
color:#22c55e;
margin-bottom:15px;
}

.home-btn{
margin-top:35px;
padding:15px 30px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<nav>

<div class="logo">
🧠 QuizHub
</div>

</nav>

<!-- JOIN -->

<div class="popup"
id="popup">

<div class="popup-box">

<h2>
Join Exam
</h2>

<input type="text"
id="name"
placeholder="Enter Name">

<input type="text"
id="roll"
placeholder="Enter Roll Number">

<input type="text"
id="dept"
placeholder="Enter Department">

<input type="text"
id="quizCodeInput"
placeholder="Enter Quiz Code">

<button onclick="joinQuiz()">
Enter Exam
</button>

</div>

</div>

<div class="container">

<!-- WAITING -->

<div class="waiting"
id="waitingBox">

<h1 style="font-size:20px;margin-bottom:15px;">
⏳ Waiting For Teacher To Start Exam
</h1>

<p style="color:#ccc;">
Exam will automatically start for all students
</p>

</div>

<!-- QUIZ -->

<div class="quiz-box"
id="quizBox">

<div class="top">

<div>

<div class="quiz-title"
id="title">
Quiz
</div>

<div id="studentInfo"
style="margin-top:8px;font-size:14px;color:#ccc;">
</div>

</div>

<div class="timer"
id="timer">
00:00
</div>

</div>

<div class="progress"
id="progress">
</div>

<div class="question"
id="question">
</div>

<div id="options"></div>

<div class="btns">

<button class="btn prev"
onclick="previousQuestion()">

⬅ Previous

</button>

<button class="btn next"
onclick="nextQuestion()">

Next ➡

</button>

<button class="btn finish"
onclick="finishQuiz()">

Finish Exam

</button>

</div>

</div>

</div>

<script>

let code = "";

let quiz = null;

let current = 0;

let answers = [];

let timeLeft = 0;

let started = false;

let timerInterval = null;

/* JOIN */

function joinQuiz(){

let name =
document.getElementById("name").value.trim();

let roll =
document.getElementById("roll").value.trim();

let dept =
document.getElementById("dept").value.trim();

code =
document.getElementById("quizCodeInput").value.trim();

if(!name || !roll || !dept || !code){

alert("Fill all fields");

return;

}

sessionStorage.setItem("name",name);
sessionStorage.setItem("roll",roll);
sessionStorage.setItem("dept",dept);

document.getElementById("popup").style.display =
"none";

document.getElementById("waitingBox").style.display =
"flex";

loadQuiz();

setInterval(checkQuizStarted,2000);

}

/* LOAD QUIZ */

function loadQuiz(){

fetch("/get-quiz?code=" + code)

.then(res=>res.json())

.then(data=>{

if(!data.success){

alert("Quiz Not Found");

location.reload();

return;

}

quiz = data.quiz;

timeLeft = quiz.duration * 60;

})

.catch(err=>{

console.log(err);

});

}

/* CHECK START */

function checkQuizStarted(){

fetch("/get-quiz?code=" + code)

.then(res=>res.json())

.then(data=>{

if(data.success){

quiz = data.quiz;

if(quiz.is_started && !started){

started = true;

document.getElementById("waitingBox").style.display =
"none";

document.getElementById("quizBox").style.display =
"block";

document.getElementById("title").innerText =
quiz.title;

document.getElementById("studentInfo").innerHTML =

sessionStorage.getItem("name") +

" | " +

sessionStorage.getItem("roll") +

" | " +

sessionStorage.getItem("dept");

loadQuestion();

startTimer();

}

}

})

.catch(err=>{

console.log(err);

});

}

/* LOAD QUESTION */

function loadQuestion(){

let q = quiz.questions[current];

document.getElementById("progress").innerText =

"Question " +

(current + 1) +

" of " +

quiz.questions.length;

document.getElementById("question").innerText =
q.q;

let optionsHTML = "";

q.options.forEach((opt,index)=>{

optionsHTML += `

<div class="option
${answers[current] == index ? 'selected' : ''}"

onclick="selectOption(${index})">

${opt}

</div>

`;

});

document.getElementById("options").innerHTML =
optionsHTML;

}

/* SELECT */

function selectOption(index){

answers[current] = index;

loadQuestion();

}

/* NEXT */

function nextQuestion(){

if(current < quiz.questions.length - 1){

current++;

loadQuestion();

}

}

/* PREVIOUS */

function previousQuestion(){

if(current > 0){

current--;

loadQuestion();

}

}

/* TIMER */

function startTimer(){

timerInterval = setInterval(()=>{

timeLeft--;

let mins = Math.floor(timeLeft / 60);

let secs = timeLeft % 60;

document.getElementById("timer").innerText =

String(mins).padStart(2,'0') +

":" +

String(secs).padStart(2,'0');

if(timeLeft <= 0){

finishQuiz();

}

},1000);

}

/* FINISH */

function finishQuiz(){

clearInterval(timerInterval);

let marks = 0;

quiz.questions.forEach((q,index)=>{

if(answers[index] == q.correct){

marks++;

}

});

fetch("/save-result",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

code:quiz.quiz_code,

name:sessionStorage.getItem("name"),

roll:sessionStorage.getItem("roll"),

department:sessionStorage.getItem("dept"),

marks:marks,

total:quiz.questions.length

})

})

.then(res=>res.json())

.then(data=>{

document.body.innerHTML = `

<div class="complete-page">

<div class="complete-card">

<h1>
✅
</h1>

<h2>
Exam Completed
</h2>

<p style="margin-top:15px;">

You scored ${marks} /
${quiz.questions.length}

</p>

<button class="home-btn"
onclick="location.reload()">

Done

</button>

</div>

</div>

`;

})

.catch(err=>{

console.log(err);

});

}

</script>

</body>
</html>
