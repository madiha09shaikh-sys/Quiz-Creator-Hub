<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Play Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
overflow-x:hidden;
}

nav{
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:700;
color:#a855f7;
}

.container{
max-width:950px;
margin:25px auto;
padding:15px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
width:430px;
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:25px;
backdrop-filter:blur(15px);
box-shadow:0 0 35px rgba(168,85,247,0.5);
}

.popup-box h2{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

.popup-box input{
width:100%;
padding:15px;
margin-top:14px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

.popup-box input::placeholder{
color:#ccc;
}

.popup-box button{
width:100%;
padding:15px;
margin-top:22px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

/* WAITING */

.waiting{
display:none;
min-height:80vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:40px 20px;
}

/* QUIZ */

.quiz-box{
display:none;
background:rgba(255,255,255,0.06);
padding:28px;
border-radius:25px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.quiz-title{
font-size:30px;
font-weight:700;
}

.timer{
background:#ef4444;
padding:12px 20px;
border-radius:12px;
font-size:20px;
font-weight:bold;
}

.progress{
margin-bottom:20px;
color:#ccc;
font-size:16px;
}

.question{
font-size:25px;
line-height:1.6;
margin-bottom:20px;
font-weight:600;
}

.option{
background:rgba(255,255,255,0.07);
padding:18px;
border-radius:15px;
margin-top:14px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
font-size:16px;
}

.option:hover{
background:#7c3aed;
}

.selected{
background:#9333ea;
border:2px solid #c084fc;
}

.btns{
display:flex;
gap:12px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
padding:14px 24px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:15px;
font-weight:600;
color:white;
}

.prev{
background:#3b82f6;
}

.next{
background:#22c55e;
}

.finish{
background:#ef4444;
}

/* WARNING */

.warning-box{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
padding:18px 22px;
border-radius:16px;
font-size:15px;
font-weight:600;
z-index:999999;
box-shadow:0 0 25px rgba(239,68,68,0.6);
animation:shake 0.4s;
}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}

}

/* COMPLETE */

.complete-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
z-index:99999;
padding:20px;
}

.complete-card{
width:520px;
background:rgba(255,255,255,0.08);
padding:45px;
border-radius:35px;
text-align:center;
backdrop-filter:blur(18px);
box-shadow:0 0 35px rgba(168,85,247,0.6);
border:1px solid rgba(255,255,255,0.1);
}

.complete-icon{
font-size:90px;
margin-bottom:15px;
}

.complete-card h1{
font-size:38px;
margin-bottom:10px;
}

.complete-card p{
font-size:16px;
color:#ddd;
line-height:1.8;
margin-top:10px;
}

.finish-btn{
margin-top:35px;
padding:16px 30px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#a855f7,#6d28d9);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
width:100%;
}

.finish-btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<nav>

<div class="logo">
🧠 QuizHub
</div>

</nav>

<!-- JOIN -->

<div class="popup"
id="popup">

<div class="popup-box">

<h2>
Join Exam
</h2>

<input type="text"
id="name"
placeholder="Enter Name">

<input type="text"
id="roll"
placeholder="Enter Roll Number">

<input type="text"
id="dept"
placeholder="Enter Department">

<input type="text"
id="quizCodeInput"
placeholder="Enter Quiz Code">

<button onclick="joinQuiz()">
Enter Exam
</button>

</div>

</div>

<div class="container">

<!-- WAITING -->

<div class="waiting"
id="waitingBox">

<h1 style="
font-size:28px;
margin-bottom:15px;
">
⏳ Waiting For Teacher
</h1>

<p style="
font-size:16px;
color:#ddd;
line-height:1.8;
">
Exam will start automatically when teacher clicks
<b style="color:#a855f7;">
Start Exam
</b>
</p>

</div>

<!-- QUIZ -->

<div class="quiz-box"
id="quizBox">

<div class="top">

<div>

<div class="quiz-title"
id="title">
Quiz
</div>

<div id="studentInfo"
style="margin-top:8px;font-size:14px;color:#ccc;">
</div>

</div>

<div class="timer"
id="timer">
00:00
</div>

</div>

<div class="progress"
id="progress">
</div>

<div class="question"
id="question">
</div>

<div id="options"></div>

<div class="btns">

<button class="btn prev"
onclick="previousQuestion()">
⬅ Previous
</button>

<button class="btn next"
onclick="nextQuestion()">
Next ➡
</button>

<button class="btn finish"
onclick="finishQuiz()">
Finish Exam
</button>

</div>

</div>

</div>

<script>

let code = "";
let quiz = null;

let current = 0;
let answers = [];

let timeLeft = 0;

let examStarted = false;
let timerInterval = null;
let checkInterval = null;

let warningCount = 0;

/* WARNING SOUND */

const warningSound = new Audio(
"https://www.soundjay.com/buttons/sounds/beep-07.mp3"
);

warningSound.volume = 1;

/* JOIN */

function joinQuiz(){

let name =
document.getElementById("name").value.trim();

let roll =
document.getElementById("roll").value.trim();

let dept =
document.getElementById("dept").value.trim();

code =
document.getElementById("quizCodeInput").value.trim();

if(!name || !roll || !dept || !code){

alert("Fill all fields");
return;

}

sessionStorage.setItem("name",name);
sessionStorage.setItem("roll",roll);
sessionStorage.setItem("dept",dept);

document.getElementById("popup").style.display =
"none";

document.getElementById("waitingBox").style.display =
"flex";

loadQuiz();

}

/* LOAD QUIZ */

function loadQuiz(){

fetch("/get-quiz?code=" + code)

.then(res=>res.json())

.then(data=>{

if(!data.success){

alert("Quiz Not Found");
location.reload();
return;

}

quiz = data.quiz;

document.getElementById("title").innerText =
quiz.title;

document.getElementById("studentInfo").innerHTML =

sessionStorage.getItem("name") +
" | " +
sessionStorage.getItem("roll") +
" | " +
sessionStorage.getItem("dept");

timeLeft = quiz.duration * 60;

answers = new Array(
quiz.questions.length
).fill(null);

if(quiz.is_started){

startExam();

}else{

waitForStart();

}

})

.catch(err=>{

console.log(err);

});

}

/* WAIT */

function waitForStart(){

checkInterval = setInterval(()=>{

fetch("/get-quiz?code=" + code)

.then(res=>res.json())

.then(data=>{

if(data.success){

if(data.quiz.is_started){

clearInterval(checkInterval);

startExam();

}

}

});

},2000);

}

/* START EXAM */

function startExam(){

if(examStarted) return;

examStarted = true;

document.getElementById("waitingBox").style.display =
"none";

document.getElementById("quizBox").style.display =
"block";

renderQuestion();

startTimer();

enableWarnings();

}

/* TIMER */

function startTimer(){

timerInterval = setInterval(()=>{

timeLeft--;

let min =
Math.floor(timeLeft / 60);

let sec =
timeLeft % 60;

document.getElementById("timer").innerText =

String(min).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

if(timeLeft <= 0){

clearInterval(timerInterval);

finishQuiz();

}

},1000);

}

/* RENDER */

function renderQuestion(){

let q =
quiz.questions[current];

document.getElementById("progress").innerText =

"Question "
+
(current + 1)
+
" of "
+
quiz.questions.length;

document.getElementById("question").innerText =
q.q;

let optionsHTML = "";

q.options.forEach((opt,index)=>{

optionsHTML += `

<div class="option
${answers[current] == index ? 'selected' : ''}"

onclick="selectOption(${index})">

${opt}

</div>

`;

});

document.getElementById("options").innerHTML =
optionsHTML;

}

/* SELECT */

function selectOption(index){

answers[current] = index;

renderQuestion();

}

/* NEXT */

function nextQuestion(){

if(current < quiz.questions.length - 1){

current++;

renderQuestion();

}

}

/* PREVIOUS */

function previousQuestion(){

if(current > 0){

current--;

renderQuestion();

}

}

/* WARNINGS */

function enableWarnings(){

document.addEventListener("visibilitychange",()=>{

if(document.hidden){

showWarning();

}

});

window.addEventListener("blur",()=>{

showWarning();

});

document.addEventListener("contextmenu",(e)=>{

e.preventDefault();

showWarning();

});

document.addEventListener("copy",(e)=>{

e.preventDefault();

showWarning();

});

}

/* SHOW WARNING */

function showWarning(){

warningCount++;

warningSound.play();

let div =
document.createElement("div");

div.className = "warning-box";

div.innerHTML =

"⚠ WARNING "
+
warningCount +
"/3 <br><br> Do not leave exam screen";

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},3000);

if(warningCount >= 3){

alert("Exam Auto Submitted");

finishQuiz();

}

}

/* FINISH */

function finishQuiz(){

clearInterval(timerInterval);

let marks = 0;

quiz.questions.forEach((q,index)=>{

if(answers[index] == q.correct){

marks++;

}

});

fetch("/save-result",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

code:code,

name:sessionStorage.getItem("name"),

roll:sessionStorage.getItem("roll"),

department:sessionStorage.getItem("dept"),

marks:marks,

total:quiz.questions.length

})

})

.then(res=>res.json())

.then(data=>{

document.body.innerHTML = `

<div class="complete-page">

<div class="complete-card">

<div class="complete-icon">
🎉
</div>

<h1>
Exam Completed
</h1>

<p>
Your exam has been submitted successfully.
</p>

<p>
Thank you for participating in the test.
</p>

<p>
You can now safely close this page.
</p>

<button class="finish-btn"
onclick="window.location.href='/'">

🏠 Go To Home

</button>

</div>

</div>

`;

});

}

</script>

</body>
</html>
